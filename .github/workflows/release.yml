name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update manifest version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          jq --arg v "$VERSION" '.version = $v' custom_components/visonic_cloud/manifest.json > tmp.json
          mv tmp.json custom_components/visonic_cloud/manifest.json

      - name: Create release zip
        run: |
          cd custom_components/visonic_cloud
          zip -r ../../visonic_cloud.zip .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: visonic_cloud.zip
